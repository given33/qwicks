name: Build and Deploy Code Updates

on:
  push:
    branches:
      - main
    paths:
      - 'src/renderer/**'
      - 'src/preload/**'
      - 'src/asset/**'
      - 'qwicks/src/**'
      - 'qwicks/tests/**'
  workflow_dispatch:
    inputs:
      channel:
        description: Update channel
        required: true
        default: stable
        type: choice
        options:
          - stable
          - frontier
      version:
        description: Optional x.y.z code version override
        required: false
        type: string
      release_notes:
        description: Optional update notes shown in QWicks
        required: false
        type: string

permissions:
  contents: read

env:
  NODE_VERSION: 22.13.1
  DEFAULT_UPDATE_BASE_URL: http://8.138.40.16/qwicks

jobs:
  build-code-update:
    runs-on: windows-latest
    env:
      QWICKS_UPDATE_CHANNEL: ${{ github.event.inputs.channel || 'stable' }}
      QWICKS_UPDATE_BASE_URL: ${{ vars.QWICKS_UPDATE_BASE_URL || 'http://8.138.40.16/qwicks' }}
      QWICKS_SERVER_DEPLOY_PATH: ${{ vars.QWICKS_SERVER_DEPLOY_PATH || '/www/wwwroot/update/qwicks' }}
      QWICKS_MIN_SHELL_VERSION: ${{ vars.QWICKS_MIN_SHELL_VERSION || '0.1.0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check hot-update-safe change set
        id: hot_safe
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -ne "push") {
            "hot_safe=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Manual workflow dispatch may deploy a code update."
            exit 0
          }

          $base = "${{ github.event.before }}".Trim()
          if (-not $base -or $base -match '^0+$') {
            $base = 'HEAD~1'
          }
          $files = @(git diff --name-only $base $env:GITHUB_SHA)
          $unsafe = @($files | Where-Object { $_ -notmatch '^(src/renderer/|src/preload/|src/asset/|qwicks/src/|qwicks/tests/)' })
          if ($unsafe.Count -gt 0) {
            Write-Host "Skipping server deploy because this push includes non-hot-update-safe files:"
            $unsafe | ForEach-Object { Write-Host "  $_" }
            "hot_safe=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "hot_safe=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Compute code version
        id: version
        shell: pwsh
        run: |
          $manual = '${{ github.event.inputs.version }}'.Trim()
          if ($manual) {
            $version = $manual
          } else {
            $pkg = Get-Content package.json -Raw | ConvertFrom-Json
            $parts = $pkg.version.Split('.')
            $version = "$($parts[0]).$($parts[1]).$env:GITHUB_RUN_NUMBER"
          }
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version must be x.y.z, got: $version"
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "QWICKS_APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Building QWicks code update $version on $env:QWICKS_UPDATE_CHANNEL"

      - name: Typecheck
        shell: pwsh
        run: npm run typecheck

      - name: Build app code
        shell: pwsh
        run: |
          if (Test-Path out) { Remove-Item -Recurse -Force out }
          if (Test-Path dist/code-update) { Remove-Item -Recurse -Force dist/code-update }
          npm run build

      - name: Package code.zip
        shell: pwsh
        run: |
          $packageRoot = 'dist/code-update/package'
          New-Item -ItemType Directory -Force -Path "$packageRoot/renderer" | Out-Null
          New-Item -ItemType Directory -Force -Path "$packageRoot/preload" | Out-Null
          New-Item -ItemType Directory -Force -Path "$packageRoot/qwicks" | Out-Null

          Copy-Item -Recurse -Force out/renderer/* "$packageRoot/renderer/"
          Copy-Item -Recurse -Force out/preload/* "$packageRoot/preload/"
          Copy-Item -Recurse -Force qwicks/dist "$packageRoot/qwicks/dist"
          Copy-Item -Force qwicks/package.json "$packageRoot/qwicks/package.json"

          if (Test-Path dist/code-update/code.zip) { Remove-Item -Force dist/code-update/code.zip }
          Compress-Archive -Path "$packageRoot/*" -DestinationPath dist/code-update/code.zip -Force

      - name: Write release notes
        shell: pwsh
        env:
          MANUAL_RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          $manualNotes = "$env:MANUAL_RELEASE_NOTES".Trim()
          if ($manualNotes) {
            $notes = $manualNotes
          } else {
            $subject = git log -1 --pretty=%s
            $notes = "Update: $subject"
          }
          Set-Content -Encoding utf8 -Path dist/code-update/release-notes.md -Value $notes

      - name: Write code latest.json
        shell: pwsh
        run: |
          node scripts/write-code-update-json.cjs `
            --dist dist/code-update `
            --package dist/code-update/code.zip `
            --platform win `
            --channel "$env:QWICKS_UPDATE_CHANNEL" `
            --base-url "$env:QWICKS_UPDATE_BASE_URL" `
            --version "${{ steps.version.outputs.version }}" `
            --min-shell-version "$env:QWICKS_MIN_SHELL_VERSION" `
            --release-notes-file dist/code-update/release-notes.md

      - name: Upload code update artifact
        uses: actions/upload-artifact@v4
        with:
          name: QWicks-${{ steps.version.outputs.version }}-code-update
          path: |
            dist/code-update/code.zip
            dist/code-update/latest.json
            dist/code-update/release-notes.md
          if-no-files-found: error

      - name: Deploy code update to Aliyun server
        if: ${{ github.event_name != 'push' || steps.hot_safe.outputs.hot_safe == 'true' }}
        shell: pwsh
        env:
          SERVER_SSH_HOST: ${{ secrets.SERVER_SSH_HOST || secrets.ALIYUN_SSH_HOST || '8.138.40.16' }}
          SERVER_SSH_PORT: ${{ secrets.SERVER_SSH_PORT || secrets.ALIYUN_SSH_PORT || '22' }}
          SERVER_SSH_USER: ${{ secrets.SERVER_SSH_USER || secrets.ALIYUN_SSH_USER || 'root' }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY || secrets.ALIYUN_SSH_KEY }}
        run: |
          if (-not $env:SERVER_SSH_KEY) {
            throw "Set the SERVER_SSH_KEY GitHub secret to enable server upload."
          }

          $sshDir = Join-Path $env:USERPROFILE '.ssh'
          New-Item -ItemType Directory -Force -Path $sshDir | Out-Null
          $keyPath = Join-Path $sshDir 'qwicks_aliyun_deploy_key'
          $beginMarker = '-----BEGIN OPENSSH PRIVATE KEY-----'
          $endMarker = '-----END OPENSSH PRIVATE KEY-----'
          $key = [string]$env:SERVER_SSH_KEY
          $key = $key.Replace('\r\n', "`n").Replace('\n', "`n")
          $key = $key.Replace("`r`n", "`n").Replace("`r", "`n")
          $key = $key.Replace([string][char]0xFEFF, '').Replace([string][char]0x200B, '').Trim()
          $body = $key.Replace($beginMarker, '').Replace($endMarker, '') -replace '\s+', ''
          if (-not $body) {
            throw "SERVER_SSH_KEY is empty after normalization."
          }
          $bodyLines = [regex]::Matches($body, '.{1,70}') | ForEach-Object { $_.Value }
          $normalizedKey = "$beginMarker`n$($bodyLines -join "`n")`n$endMarker`n"
          [System.IO.File]::WriteAllText($keyPath, $normalizedKey, [System.Text.Encoding]::ASCII)
          icacls $keyPath /inheritance:r /grant:r "$($env:USERNAME):R" | Out-Null
          & ssh-keygen -y -f $keyPath *> $null
          if ($LASTEXITCODE -ne 0) {
            throw "SERVER_SSH_KEY is not a valid OpenSSH private key. Paste the complete key, including BEGIN/END lines, into the GitHub secret."
          }
          Write-Host "SSH key format validated."
          $fingerprint = (& ssh-keygen -lf $keyPath) -join ' '
          Write-Host "Deploy key fingerprint: $fingerprint"

          $remote = "$env:SERVER_SSH_USER@$env:SERVER_SSH_HOST"
          $sshArgs = @('-i', $keyPath, '-p', $env:SERVER_SSH_PORT, '-o', 'StrictHostKeyChecking=no', '-o', 'IdentitiesOnly=yes', '-o', 'BatchMode=yes', '-o', 'ConnectTimeout=15')
          $scpArgs = @('-i', $keyPath, '-P', $env:SERVER_SSH_PORT, '-o', 'StrictHostKeyChecking=no', '-o', 'IdentitiesOnly=yes', '-o', 'BatchMode=yes', '-o', 'ConnectTimeout=15')
          & ssh @sshArgs $remote "echo QWICKS_SSH_OK"
          if ($LASTEXITCODE -ne 0) {
            throw "SSH login failed. Check SERVER_SSH_USER, SERVER_SSH_HOST, SERVER_SSH_PORT, and make sure the matching public key is in the server user's ~/.ssh/authorized_keys."
          }

          function Quote-RemotePath([string]$value) {
            return "'" + $value.Replace("'", "'`"`"`'") + "'"
          }

          function Public-OriginUrl([string]$baseUrl) {
            $uri = [Uri]$baseUrl
            $builder = [UriBuilder]::new($uri.Scheme, $uri.Host, $uri.Port)
            $builder.Path = '/'
            return $builder.Uri.AbsoluteUri.TrimEnd('/')
          }

          $deployBase = "$env:QWICKS_SERVER_DEPLOY_PATH".Trim()
          if (-not $deployBase) {
            $detectRootScript = 'for base in /usr/share/nginx /var/www /www /home/wwwroot /data/wwwroot /usr/local/nginx; do [ -d "$base" ] && find "$base" -maxdepth 6 -type f -name latest.json -exec dirname {} \; 2>/dev/null; done; if command -v nginx >/dev/null 2>&1; then nginx -T 2>/dev/null | awk "/^[[:space:]]*(root|alias)[[:space:]]+/ { gsub(\";\", \"\", \$2); print \$2 }"; fi; for p in /usr/share/nginx/html /var/www/html /www/wwwroot/default /www/wwwroot/8.138.40.16 /www/server/nginx/html /usr/local/nginx/html /var/www /home/wwwroot/default /data/wwwroot/default; do [ -d "$p" ] && printf "%s\n" "$p"; done'
            $candidateLines = @(& ssh @sshArgs $remote $detectRootScript)
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to list remote web root candidates over SSH."
            }
            $candidateDirs = @($candidateLines | Where-Object { $_ -and $_.Trim() } | ForEach-Object { $_.Trim() } | Select-Object -Unique)
            if ($candidateDirs.Count -eq 0) {
              throw "No existing web root candidates were found on the server."
            }

            $originUrl = Public-OriginUrl "$env:QWICKS_UPDATE_BASE_URL"
            $probeName = "qwicks-deploy-probe-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT.txt"
            $probeBody = 'QWICKS_DEPLOY_PROBE'
            $webRoot = ''
            foreach ($candidate in $candidateDirs) {
              $probePath = "$candidate/$probeName"
              & ssh @sshArgs $remote "printf '$probeBody' > $(Quote-RemotePath $probePath)"
              if ($LASTEXITCODE -ne 0) { continue }
              try {
                $probeUrl = "$originUrl/$probeName"
                $response = Invoke-WebRequest -Uri $probeUrl -Headers @{ 'Cache-Control' = 'no-cache'; 'User-Agent' = 'QWicks-CI' } -TimeoutSec 8
                if ([string]$response.Content -eq $probeBody) {
                  $webRoot = $candidate
                  break
                }
              } catch {
                Write-Host "Probe did not match for $candidate"
              } finally {
                & ssh @sshArgs $remote "rm -f $(Quote-RemotePath $probePath)" | Out-Null
              }
            }
            if (-not $webRoot) {
              throw "Could not find the public Nginx web root. Set repository variable QWICKS_SERVER_DEPLOY_PATH to the server directory that is served as $originUrl/qwicks."
            }
            $deployBase = "$webRoot/qwicks"
            Write-Host "Detected server deploy path: $deployBase"
          }

          $remoteDir = "$deployBase/channels/$env:QWICKS_UPDATE_CHANNEL/latest"

          & ssh @sshArgs $remote "mkdir -p '$remoteDir'"
          if ($LASTEXITCODE -ne 0) { throw "Failed to create remote update directory" }

          foreach ($file in @('dist/code-update/code.zip', 'dist/code-update/latest.json')) {
            & scp @scpArgs $file "${remote}:$remoteDir/"
            if ($LASTEXITCODE -ne 0) { throw "Failed to upload $file" }
          }

          Write-Host "Uploaded code update feed to $env:QWICKS_UPDATE_BASE_URL/channels/$env:QWICKS_UPDATE_CHANNEL/latest/"
